server {
  listen       80;
  server_name  _;

  root   /usr/share/nginx/html;
  index  index.html;

  # Long-cache hashed assets, never cache the HTML shell.
  location ~* \.(?:js|css|svg|png|jpg|jpeg|gif|webp|woff2?|ttf|eot)$ {
    expires 30d;
    access_log off;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  # SPA routing: every unknown path falls back to index.html so React
  # Router can handle deep links such as /help/user-guide/getting-started.
  location / {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    try_files $uri $uri/ /index.html;
  }

  # We *want* this site to be embeddable in the host app's help drawer,
  # so explicitly do NOT set X-Frame-Options. nginx defaults to no
  # header, but we make the intent explicit here for future maintainers.
  # add_header X-Frame-Options "" always;  # <-- intentionally not set
}
