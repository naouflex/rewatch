# Production setup, modeled after ~/inverse-watch/docker-compose.yml.
# REDASH_DATABASE_URL / REDASH_HOST / mail credentials are loaded from .env.
x-redash-service: &redash-service
  build:
    context: .
    args:
      skip_frontend_build: "true"  # set to empty string to build
  volumes:
    - .:/app
  env_file:
    - .env
  restart: unless-stopped
x-redash-environment: &redash-environment
  REDASH_LOG_LEVEL: "INFO"
  REDASH_REDIS_URL: "redis://redis:6379/0"
  REDASH_DATABASE_URL: ${REDASH_DATABASE_URL}
  REDASH_RATELIMIT_ENABLED: "false"
  REDASH_MAIL_DEFAULT_SENDER: ${REDASH_MAIL_DEFAULT_SENDER}
  REDASH_MAIL_SERVER: ${REDASH_MAIL_SERVER}
  REDASH_MAIL_PORT: ${REDASH_MAIL_PORT}
  REDASH_ENFORCE_CSRF: "true"
  REDASH_GUNICORN_TIMEOUT: 60
  # Set secret keys in the .env file
services:
  server:
    <<: *redash-service
    command: server
    depends_on:
      - redis
    ports:
      - "5001:5000"
    environment:
      <<: *redash-environment
      PYTHONUNBUFFERED: 0
  scheduler:
    <<: *redash-service
    command: scheduler
    depends_on:
      - server
    environment:
      <<: *redash-environment
  worker:
    <<: *redash-service
    command: worker
    depends_on:
      - server
    environment:
      <<: *redash-environment
      PYTHONUNBUFFERED: 0
  # Dedicated worker for MLModels training/prediction. Built from
  # Dockerfile.ml which layers the scikit-learn / scipy / statsmodels stack
  # (plus libgomp1 / libopenblas) on top of the regular redash-worker image.
  # It listens only on the `training` and `predicting` RQ queues so heavy ML
  # jobs don't starve the standard query workers.
  ml-worker:
    build:
      context: .
      dockerfile: Dockerfile.ml
      args:
        BASE_IMAGE: redash-worker:latest
    command: worker
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - server
      - worker
    restart: unless-stopped
    environment:
      <<: *redash-environment
      PYTHONUNBUFFERED: 0
      QUEUES: "training,predicting"
      WORKERS_COUNT: 1
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
  # NOTE: no local postgres service. REDASH_DATABASE_URL in .env points at the
  # GCP Cloud SQL `watch-db-vm` instance over its public IP (sslmode=require). The
  # client host's public IPv4 must be in that instance's Authorized Networks. To
  # run a local Postgres instead, restore a `postgres` service here and set
  # REDASH_DATABASE_URL=postgresql://redash:redash@postgres:5432/redash.
  # The landing site + in-app help center is now its own Docker stack so it
  # can be deployed on a separate VM. See ../landing/ for the project, and
  # build the frontend with REDASH_HELP_BASE_URL=https://<landing-host>
  # (consumed by client/app/components/HelpTrigger.jsx) so the question-mark
  # icon in the sidebar opens that host instead of localhost:5002.
volumes:
  redis_data:
